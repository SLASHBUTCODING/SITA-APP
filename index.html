<!DOCTYPE html>
<html lang="fil">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <title>SITA - Tricycle Ride-Hailing</title>
    <meta name="description" content="Book a tricycle ride anywhere in your barangay" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme color (Android Chrome toolbar + iOS status bar) -->
    <meta name="theme-color" content="#F47920" />

    <!-- iOS PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SITA" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.svg" />

    <!-- Splash screen color for iOS -->
    <meta name="msapplication-TileColor" content="#F47920" />
    <meta name="msapplication-TileImage" content="/icons/icon-192x192.svg" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/icons/icon-192x192.svg" />

    <!-- Prevent phone number detection -->
    <meta name="format-detection" content="telephone=no" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('[SW] Registered:', reg.scope))
            .catch(err => console.warn('[SW] Registration failed:', err));
        });
      }
    </script>
  </body>
</html>
