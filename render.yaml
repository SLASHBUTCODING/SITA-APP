services:
  # SITA Frontend on Render
  - type: web
    name: sita-frontend
    buildCommand: "npm install && npm run build"
    startCommand: "node server.js"
    domains:
      - sita.onrender.com
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: NODE_ENV
        value: production
